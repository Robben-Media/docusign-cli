version: 2

project_name: docusign-cli

changelog:
  disable: true

builds:
  - id: docusign
    main: ./cmd/docusign
    binary: docusign-cli
    ldflags: >-
      -s -w
      -X github.com/builtbyrobben/docusign-cli/internal/cmd.version={{ .Tag }}
      -X github.com/builtbyrobben/docusign-cli/internal/cmd.commit={{ .ShortCommit }}
      -X github.com/builtbyrobben/docusign-cli/internal/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: docusign_darwin
    main: ./cmd/docusign
    binary: docusign-cli
    ldflags: >-
      -s -w
      -X github.com/builtbyrobben/docusign-cli/internal/cmd.version={{ .Tag }}
      -X github.com/builtbyrobben/docusign-cli/internal/cmd.commit={{ .ShortCommit }}
      -X github.com/builtbyrobben/docusign-cli/internal/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=1
    targets:
      - darwin_amd64
      - darwin_arm64

archives:
  - ids:
      - docusign
      - docusign_darwin
    formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: checksums.txt
